<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival Setlist Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">🎪 Festival Setlist Creator</h1>
      <button id="theme-toggle" class="theme-toggle">☾/☀</button>
    </header>

    <main id="main-content">
      <section class="card">
        <h2 class="card-title">Search Artists</h2>
        <div class="search-box">
          <input
            type="text"
            id="artist-input"
            class="input"
            placeholder="Artist name..."
            autocomplete="off"
          />
          <div id="search-spinner" class="spinner hidden"></div>
        </div>
        <div id="search-results" class="dropdown hidden"></div>
        <p id="search-error" class="error hidden"></p>
      </section>

      <section class="card" id="artists-card">
        <h2 class="card-title">Your Festival Lineup</h2>
        <p id="empty-list-msg" class="muted">No artists added yet.</p>
        <ul id="artist-list" class="artist-list"></ul>
        <button id="create-btn" class="btn btn-primary btn-full hidden" onclick="createPlaylist()">
          <span id="create-label">Create Festival Setlist</span>
          <span id="create-spinner" class="spinner hidden"></span>
        </button>
        <p id="create-error" class="error hidden"></p>
      </section>

      <section class="card hidden" id="result-card">
        <h2 class="card-title">Your Playlist is Ready!</h2>
        <div id="artist-summary" class="summary-list"></div>
        <a id="playlist-link" href="#" target="_blank" class="btn btn-spotify">
          Open in Spotify
        </a>
        <div id="player-wrap" class="player-wrap"></div>
        <button class="btn btn-ghost btn-full" onclick="resetResult()">Create Another</button>
      </section>
    </main>


  </div>

  <footer>
    <a href="https://github.com/based-on-what/festival-setlistfm" target="_blank" rel="noopener noreferrer">
      Festival Setlist Creator — Coded with ❤️ by @based-on-what
    </a>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
